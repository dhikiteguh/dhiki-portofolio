<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · Dhiki Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f1;--card:#ffffff;--text:#1a1a1a;--muted:#888783;--border:rgba(0,0,0,0.08);--tag:#f0efe9;--tag-text:#666;--accent:#1a1a1a;--danger:#e24b4a;--danger-bg:#fcebeb}
body.dark{--bg:#111110;--card:#1c1c1a;--text:#eeede8;--muted:#5a5956;--border:rgba(255,255,255,0.08);--tag:#272725;--tag-text:#888;--accent:#eeede8;--danger:#f09595;--danger-bg:rgba(226,75,74,0.15)}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s}

/* ── LOGIN ── */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-wrap{width:100%;max-width:360px}
.login-brand{font-size:13px;font-weight:600;margin-bottom:2rem;letter-spacing:-.01em}
.login-brand span{color:var(--muted);font-weight:400}
.login-card{background:var(--card);border:0.5px solid var(--border);border-radius:20px;padding:2rem;box-shadow:0 4px 32px rgba(0,0,0,0.06)}
.login-h{font-size:1.25rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.25rem}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:1.8rem}
.fld{margin-bottom:.9rem}
.fld label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px}
.fld input{width:100%;padding:10px 13px;border:0.5px solid var(--border);border-radius:10px;font-size:13.5px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.fld input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.25rem;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.err-msg{font-size:12px;color:var(--danger);margin-top:.6rem;display:none;padding:8px 12px;background:var(--danger-bg);border-radius:8px}

/* ── DASH ── */
#dash-page{display:none}

.dash-header{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);
  padding:.75rem 1.5rem;
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:50;
}
body.dark .dash-header{background:rgba(22,22,20,0.8)}
.dh-left{display:flex;align-items:center;gap:8px}
.dh-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border);flex-shrink:0}

.dh-logo{font-size:13px;font-weight:600;letter-spacing:-.01em}
.dh-badge{font-size:10.5px;background:var(--tag);color:var(--muted);padding:3px 9px;border-radius:20px}
.dh-right{display:flex;align-items:center;gap:8px}
.hbtn{padding:6px 13px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;border:0.5px solid var(--border);background:transparent;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.hbtn:hover{background:var(--tag)}
.hbtn-ghost{color:var(--muted);border-color:transparent}
.hbtn-ghost:hover{color:var(--danger);background:var(--danger-bg)}
.hbtn-theme{padding:7px;border-radius:50%;width:32px;height:32px;justify-content:center}
.hbtn-theme svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.d-icon-sun{display:block}.d-icon-moon{display:none}
body.dark .d-icon-sun{display:none}body.dark .d-icon-moon{display:block}

.dash-body{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 5rem}

/* stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.stat-box{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:.9rem 1rem}
.stat-box .s-l{font-size:11px;color:var(--muted);margin-bottom:3px}
.stat-box .s-v{font-size:1.4rem;font-weight:600;letter-spacing:-.02em;line-height:1.1}

/* section head */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.sec-head h2{font-size:14px;font-weight:600;letter-spacing:-.01em}
.btn-add{padding:8px 14px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:opacity .15s}
.btn-add:hover{opacity:.85}

/* project cards */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.proj-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.pc-thumb{aspect-ratio:16/9;background:var(--tag);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden}
.pc-thumb img{width:100%;height:100%;object-fit:cover}
.pc-body{padding:.9rem 1rem .7rem;flex:1}
.pc-platform{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:.02em}
.pc-title{font-size:13.5px;font-weight:500;margin-bottom:4px}
.pc-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-stats{display:flex;gap:5px;flex-wrap:wrap}
.pc-stats span{font-size:10.5px;background:var(--tag);color:var(--muted);padding:2px 8px;border-radius:20px}
.pc-actions{display:flex;gap:6px;padding:.7rem 1rem;border-top:0.5px solid var(--border)}
.act-btn{flex:1;padding:7px;border-radius:9px;border:0.5px solid var(--border);font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;background:transparent;color:var(--text)}
.act-edit:hover{background:var(--tag)}
.act-del{color:var(--danger)}.act-del:hover{background:var(--danger-bg);border-color:var(--danger)}
.act-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:13px;background:var(--card);border:0.5px solid var(--border);border-radius:14px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
@media(min-width:580px){.overlay{align-items:center;padding:1.5rem}}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:24px 24px 0 0;padding:1.25rem 1.5rem 2rem;max-height:90vh;overflow-y:auto}
@media(min-width:580px){.modal{border-radius:20px;padding:2rem}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 1.2rem}
.modal-title{font-size:1rem;font-weight:600;letter-spacing:-.01em;margin-bottom:1.2rem}
.mfld{margin-bottom:.85rem}
.mfld label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px}
.mfld input,.mfld textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border .15s;resize:vertical}
.mfld input:focus,.mfld textarea:focus{border-color:var(--accent)}
.mfld-hint{font-size:11px;color:var(--muted);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-prev{width:100%;aspect-ratio:16/9;background:var(--tag);border-radius:9px;overflow:hidden;display:none;margin-top:8px}
.img-prev img{width:100%;height:100%;object-fit:cover}
.modal-foot{display:flex;gap:8px;margin-top:1.2rem}
.btn-cancel{flex:1;padding:10px;border-radius:10px;border:0.5px solid var(--border);background:transparent;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted)}
.btn-save{flex:2;padding:10px;border-radius:10px;background:var(--accent);color:var(--bg);border:none;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.85}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);font-size:12.5px;padding:9px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:500px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-box:last-child{grid-column:1/-1}
  .proj-grid{grid-template-columns:1fr}
  .dh-right .hbtn:not(.hbtn-ghost):not(.hbtn-theme){display:none}
  .grid2{grid-template-columns:1fr}
}
</style>
</head>

  <div class="login-wrap">
    <div class="login-brand">dhikiteguh <span>· portfolio cms</span></div>

      <div class="login-h">Welcome back</div>

      <button class="btn-primary" onclick="doLogin()">Sign in</button>
      <div class="err-msg" id="login-err">Username atau password salah.</div>

</div>

  <div class="dash-body">
    <div class="stats-row">
      <div class="stat-box"><div class="s-l">Total campaigns</div><div class="s-v" id="st-total">0</div></div>

      <div class="stat-box"><div class="s-l">Last saved</div><div class="s-v" style="font-size:.85rem;padding-top:4px" id="st-date">—</div></div>

    <div class="sec-head">
      <h2>Selected Work</h2>
      <button class="btn-add" onclick="openModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add campaign

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add campaign</div>
    <div class="mfld"><label>Campaign title *</label><input type="text" id="f-title" placeholder="e.g. Brand Awareness Campaign"/></div>
    <div class="mfld"><label>Platform / Client</label><input type="text" id="f-platform" placeholder="e.g. Polri · Instagram"/></div>
    <div class="mfld"><label>Description</label><textarea id="f-desc" rows="3" placeholder="Short description of the campaign..."></textarea></div>
    <div class="grid2">
      <div class="mfld"><label>Stat 1</label><input type="text" id="f-stat1" placeholder="Reach +200%"/></div>
      <div class="mfld"><label>Stat 2</label><input type="text" id="f-stat2" placeholder="ROAS 4.2x"/></div>
    </div>
    <div class="mfld"><label>Emoji icon</label><input type="text" id="f-icon" placeholder="📱" maxlength="4"/></div>
    <div class="mfld">
      <label>Image URL <span style="color:var(--muted);font-size:11px">(optional)</span></label>
      <input type="text" id="f-image" placeholder="https://..." oninput="prevImg(this.value)"/>
      <div class="mfld-hint">Upload foto ke imgur.com atau imgbb.com, lalu paste link-nya di sini.</div>
      <div class="img-prev" id="img-prev"><img id="img-prev-el" src="" alt="preview"/></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveProject()">Save campaign</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CREDS={u:'dhiki',p:'dhiki2026'};
const KEY='dhiki_projects';
const DKEY=KEY+'_date';
const DEFAULT=[
  {id:1,title:"Brand Awareness Campaign",platform:"Polri · Instagram",desc:"Social media strategy to boost Polri's public engagement and institutional trust across platforms.",stat1:"Reach +200%",stat2:"Engagement +85%",icon:"📱",image:""},
  {id:2,title:"Paid Ads Optimization",platform:"Gamatecha · Meta Ads",desc:"Restructured Meta Ads campaigns with audience segmentation and creative A/B testing for better ROAS.",stat1:"ROAS 4.2x",stat2:"CPC -38%",icon:"🎯",image:""},
  {id:3,title:"Viral Content Series",platform:"Indonesians.id · TikTok",desc:"Developed a short-form content series targeting Gen Z with trending audio, hooks, and storytelling formats.",stat1:"1.2M views",stat2:"+14K followers",icon:"🔥",image:""},
  {id:4,title:"Social Listening Report",platform:"Brand24 · Sentiment Analysis",desc:"Monitored brand mentions and competitor sentiment across platforms to inform campaign direction and tone.",stat1:"3 brands tracked",stat2:"Sentiment +62%",icon:"📊",image:""}
];

let editId=null;
function load(){try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):[...DEFAULT]}catch(e){return[...DEFAULT]}}
function persist(arr){
  localStorage.setItem(KEY,JSON.stringify(arr));
  localStorage.setItem(DKEY,new Date().toLocaleString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}));
}

function doLogin(){
  const u=document.getElementById('inp-u').value.trim();
  const p=document.getElementById('inp-p').value;
  const err=document.getElementById('login-err');
  if(u===CREDS.u&&p===CREDS.p){
    sessionStorage.setItem('dk_auth','1');
    document.getElementById('login-page').style.display='none';
    document.getElementById('dash-page').style.display='block';
    renderDash();
  } else {
    err.style.display='block';
    document.getElementById('inp-p').value='';
    setTimeout(()=>err.style.display='none',3000);
  }
}
function doLogout(){
  sessionStorage.removeItem('dk_auth');
  document.getElementById('dash-page').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('inp-u').value='';document.getElementById('inp-p').value='';
}

function renderDash(){
  const arr=load();
  document.getElementById('st-total').textContent=arr.length;
  document.getElementById('st-img').textContent=arr.filter(p=>p.image).length;
  document.getElementById('st-date').textContent=localStorage.getItem(DKEY)||'—';
  const grid=document.getElementById('proj-grid');
  if(!arr.length){grid.innerHTML='<div class="empty-state">Belum ada campaign. Klik "+ Add campaign" untuk mulai.</div>';return}
  grid.innerHTML=arr.map(p=>`
    <div class="proj-card">
      <div class="pc-thumb">${p.image?`<img src="${p.image}" alt="${p.title}" onerror="this.parentElement.innerHTML='<span style=font-size:2rem>${p.icon||'📌'}</span>'">`:p.icon||'📌'}</div>
      <div class="pc-body">
        <div class="pc-platform">${p.platform||''}</div>
        <div class="pc-title">${p.title}</div>
        <div class="pc-desc">${p.desc||''}</div>
        <div class="pc-stats">${p.stat1?`<span>${p.stat1}</span>`:''}${p.stat2?`<span>${p.stat2}</span>`:''}</div>
      </div>
      <div class="pc-actions">
        <button class="act-btn act-edit" onclick="openModal(${p.id})">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit
        </button>
        <button class="act-btn act-del" onclick="delProj(${p.id})">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg> Delete
        </button>
      </div>
    </div>`).join('');
}

function openModal(id=null){
  editId=id;
  document.getElementById('modal-title').textContent=id?'Edit campaign':'Add campaign';
  const fields=['title','platform','desc','stat1','stat2','icon','image'];
  if(id){const p=load().find(x=>x.id===id)||{};fields.forEach(k=>document.getElementById('f-'+k).value=p[k]||'');prevImg(p.image||'');}
  else{fields.forEach(k=>document.getElementById('f-'+k).value='');document.getElementById('img-prev').style.display='none';}
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}
function closeModal(){document.getElementById('overlay').classList.remove('show');editId=null}
function prevImg(url){
  const w=document.getElementById('img-prev'),img=document.getElementById('img-prev-el');
  if(url&&url.startsWith('http')){img.src=url;img.onload=()=>w.style.display='block';img.onerror=()=>w.style.display='none';}
  else w.style.display='none';
}
function saveProject(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();showToast('Judul wajib diisi!');return}
  const p={id:editId||Date.now(),title,platform:document.getElementById('f-platform').value.trim(),desc:document.getElementById('f-desc').value.trim(),stat1:document.getElementById('f-stat1').value.trim(),stat2:document.getElementById('f-stat2').value.trim(),icon:document.getElementById('f-icon').value.trim()||'📌',image:document.getElementById('f-image').value.trim()};
  let arr=load();
  if(editId) arr=arr.map(x=>x.id===editId?p:x); else arr.push(p);
  persist(arr);closeModal();renderDash();showToast(editId?'Campaign diperbarui ✓':'Campaign ditambahkan ✓');
}
function delProj(id){
  if(!confirm('Hapus campaign ini?')) return;
  persist(load().filter(p=>p.id!==id));renderDash();showToast('Campaign dihapus.');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function toggleDashTheme(){document.body.classList.toggle('dark')}
if(window.matchMedia('(prefers-color-scheme:dark)').matches) document.body.classList.add('dark');
if(sessionStorage.getItem('dk_auth')==='1'){document.getElementById('login-page').style.display='none';document.getElementById('dash-page').style.display='block';renderDash()}
</script>
</body>
